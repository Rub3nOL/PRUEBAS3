        <div class="pc" style="top:280px; left:22px;"></div>
        <div class="pc" style="top:330px; left:22px;"></div>
        <div class="pc" style="top:380px; left:22px;"></div>
        <div class="pc" style="top:430px; left:22px;"></div>

</div>

<!-- Tooltip -->
<div id="hoverTooltip" style="display:none;"></div>

<!-- Tarjeta -->
<div id="descCard" style="display:none;">
    <h4 id="descTitle"></h4>
    <p id="descText"></p>
    <button id="closeDescCard">Cerrar</button>
</div>

<!-- Volver -->
<a href="inicio.html" class="plano-back">← Inicio</a>

<script>

const selectors = [
    '.mesa-fondo-h',
    '.mesa-fondo-v',
    '.mesa-izq-unificada',
    '.mesa-inferior-dcha',
    '.mesa-central',
    '.armario'
];

const interactiveElements = document.querySelectorAll(selectors.join(','));

const hoverTooltip  = document.getElementById('hoverTooltip');
const descCard      = document.getElementById('descCard');
const descTitle     = document.getElementById('descTitle');
const descText      = document.getElementById('descText');
const closeDescBtn  = document.getElementById('closeDescCard');

closeDescBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    descCard.style.display = 'none';
});

function positionDescCard(element, title, description) {
    const rect = element.getBoundingClientRect();
    let left = rect.right + 12;
    let top  = rect.top + (rect.height / 2) - 40;

    const cardWidth  = 260;
    const cardHeight = 150;

    if (left + cardWidth > window.innerWidth)  left = rect.left - cardWidth - 12;
    if (top + cardHeight > window.innerHeight) top  = window.innerHeight - cardHeight - 10;
    if (top < 10) top = 10;

    descCard.style.left = left + 'px';
    descCard.style.top  = top  + 'px';

    descTitle.textContent = title;
    descText.textContent  = description;
    descCard.style.display = 'block';
}

function showHoverTooltip(element, text) {
    const rect = element.getBoundingClientRect();
    let left = rect.right + 10;
    let top  = rect.top + (rect.height / 2) - 15;

    if (left + 150 > window.innerWidth) left = rect.left - 110;
    if (top < 0) top = 5;
    if (top + 40 > window.innerHeight) top = window.innerHeight - 45;

    hoverTooltip.style.left    = left + 'px';
    hoverTooltip.style.top     = top  + 'px';
    hoverTooltip.textContent   = text;
    hoverTooltip.style.display = 'block';
}

function hideHoverTooltip() {
    hoverTooltip.style.display = 'none';
}

interactiveElements.forEach(el => {

    el.addEventListener('mouseenter', () => {
        el.classList.add('highlight');
        showHoverTooltip(el, el.getAttribute('data-name') || 'Elemento');
    });

    el.addEventListener('mouseleave', () => {
        el.classList.remove('highlight');
        hideHoverTooltip();
    });

    el.addEventListener('click', (e) => {
        e.stopPropagation();
        if (el.classList.contains('armario')) {
            window.location.href = 'armario.html';
        } else {
            const name = el.getAttribute('data-name') || 'Elemento';
            const desc = el.getAttribute('data-desc') || 'Sin descripción.';
            positionDescCard(el, name, desc);
        }
    });
});

document.addEventListener('click', function(e) {
    if (!descCard.contains(e.target) &&
        !Array.from(interactiveElements).some(el => el.contains(e.target)) &&
        descCard.style.display === 'block') {
        descCard.style.display = 'none';
    }
});

</script>

</body>
</html>
